name: Release

on:
  push:
    tags: ['v*']

# Repo-level setting required: Settings → Actions → General →
# "Workflow permissions" → "Read and write permissions" must be on,
# OR the repo's package-write permission must be granted explicitly.
# Without this, the docker/login step succeeds but the push fails
# with `denied: permission_denied`.

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Capture provenance for the Dockerfile's SERVICE_TREE_SHA build
      # arg. `.git/` is excluded from the Docker build context, so this
      # is the only path for the image to carry a meaningful
      # `service_tree_sha` label.
      - name: Compute git provenance
        id: provenance
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/sligara7/embeddings-rs
          # Container image tags are unprefixed semver by convention
          # (`nginx:1.25.3`, never `:v1.25.3`); git tags carry the `v`.
          # `type=semver,pattern={{version}}` strips the `v`: a `v0.1.0`
          # git tag push produces `:0.1.0`. `type=raw,value=latest` also
          # tags `:latest` so consumers can pull the most recent release.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVICE_TREE_SHA=${{ steps.provenance.outputs.sha }}
          # GitHub Actions cache: cuts subsequent rebuilds when only the
          # source has changed (the model download + onnxruntime fetch
          # dominate a cold build).
          cache-from: type=gha
          cache-to: type=gha,mode=max
